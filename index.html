<select id="m_plr2" style="display:none;" onchange="syncAll()"></select>

<label>PRS</label>

<input type="checkbox" class="checkbox" id="chk_prs" onchange="toggle('prs')"> Job PRS
<select id="m_prs" style="display:none;" onchange="syncAll()"></select>

<label>KAMTIB</label>

<select id="cuaca">
<option value="">Pilih Cuaca</option>
<option>Cerah</option>
<option>Berawan</option>
<option>Hujan</option>

<input id="j1" class="input-jalur" placeholder="Jalur I">
<input id="j2" class="input-jalur" placeholder="Jalur II">
<input id="j3" class="input-jalur" placeholder="Jalur III">
<input id="j4" class="input-jalur" placeholder="Jalur IV">
<input id="j5" class="input-jalur" placeholder="Jalur Buntu III SF">
<input id="j6" class="input-jalur" placeholder="Jalur Buntu III">
<input id="j7" class="input-jalur" placeholder="Jalur Buntu IV">

<button onclick="kirimWA()">Kirim Laporan Dinas</button>

<script>

/* AUTO WAKTU */
function autoWaktu(){
  let now = new Date();
  let jam = now.getHours();

  let shift = "";
  let tanggal = new Date(now);

  if(jam >= 0 && jam <= 6){
    shift = "Malam";
  } 
  else if(jam >= 7 && jam <= 14){
    shift = "Pagi";
  } 
  else if(jam >= 15 && jam <= 22){
    shift = "Sore";
  } 
  else if(jam >= 23){
    shift = "Malam";
    tanggal.setDate(tanggal.getDate() + 1);
  }

  document.getElementById("shift").value = shift;
  window.tanggalOtomatis = tanggal;
}

/* FORMAT RAPI BARU (ALIGN TITIK DUA PRESISI) */
function rapi(label, value, mode="A"){
  if(label === "HP"){
    return `HP : ${value}`;
  }

  let groups = {
    A: ["PPKA","Job PPKA","PLR","PLR 1","PLR 2","Job PLR","PRS","Job PRS"],
    B: ["1 Personil Security"],
    J: ["Jalur I","Jalur II","Jalur III","Jalur Badug"]
  };

  let list = groups[mode];

  // panjang maksimum + 2 spasi sebelum titik dua
  let max = Math.max(...list.map(l => l.length)) + 2;

  let kiri = `■ ${label}`;
  let spasi = " ".repeat(max - label.length);

  return `${kiri}${spasi}: ${value}`;
}

/* ROLE TERPISAH */
const ROLE = {

/* LOAD */
function load(id,list){
let el=document.getElementById(id);
el.innerHTML='<option value="">-- pilih --</option>';
list.forEach(n=>{
let o=document.createElement("option");
o.value=n;
o.text=n;
el.appendChild(o);
});
}

load("ppka",ROLE.ppka);
load("plr1",ROLE.plr);
load("plr2",["Kosong",...ROLE.plr]);
load("prs",ROLE.prs);
load("sec",Object.keys(KAMTIB));
load("m_ppka",Object.keys(MAGANG));
load("m_plr",Object.keys(MAGANG));
load("m_plr2",Object.keys(MAGANG));
load("m_prs",Object.keys(MAGANG));

function toggle(r){
let aktif = document.getElementById("chk_"+r).checked;

if(r === "plr"){
  document.getElementById("m_plr").style.display = aktif ? "block":"none";
  document.getElementById("m_plr2").style.display = aktif ? "block":"none";
}else{
  document.getElementById("m_"+r).style.display = aktif ? "block":"none";
}
}

/* ANTI DOUBLE GLOBAL */
function syncAll(){
let ids=["ppka","plr1","plr2","prs","m_ppka","m_plr","m_plr2","m_prs"];
let used=[];

ids.forEach(id=>{
let v=document.getElementById(id).value;
if(v) used.push(v);
});

ids.forEach(id=>{
let el=document.getElementById(id);
for(let opt of el.options){
if(!opt.value) continue;
opt.disabled = used.includes(opt.value) && opt.value!==el.value;
}
});
}

/* VALID */
function valid(){
let ids=["ppka","plr1","plr2","prs","sec","cuaca"];
let ok=true;
ids.forEach(id=>{
let el=document.getElementById(id);
if(!el.value){ el.classList.add("error"); ok=false;}
else el.classList.remove("error");
});
return ok;
}

/* MAIN */
function kirimWA(){

let cuaca=document.getElementById("cuaca").value;

let tanggal = tgl.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});

Hari/Tanggal : ${hari}/${tanggal}

${rapi("PPKA", ppka, "A")}
${rapi("HP", ORANG[ppka])}`;

if(chk_ppka.checked){

}

  : `${rapi("PLR 1", plr1, "A")}\n${rapi("HP", ORANG[plr1])}\n${rapi("PLR 2", plr2, "A")}\n${rapi("HP", ORANG[plr2])}`
}`;

if(m2) txt+=`\n${rapi("Job PLR", m2, "A")}\n${rapi("HP", MAGANG[m2])}`;
}

txt+=`
${rapi("PRS", prs, "A")}
${rapi("HP", ORANG[prs])}`;

}

txt+=`

Kondisi Perka Singkat :
■ Administrasi Perka Tertib
■ Kondisi Peralatan  Baik 

B. KAMTIB :
■ Kondusif dan Mancarli
${rapi("1 Personil Security", sec, "B")}

C. Cuaca : ${cuaca}

*Update Posisi Jalur Banjarsari :*
${rapi("Jalur I", j1.value||"Kosong", "J")}
${rapi("Jalur II", j2.value||"Kosong", "J")}
${rapi("Jalur III", j3.value||"Kosong", "J")}
${rapi("Jalur IV", j4.value||"Kosong", "J")}
${rapi("Jalur Buntu III SF", j5.value||"Kosong", "J")}
${rapi("Jalur Buntu III", j6.value||"Kosong", "J")}
${rapi("Jalur Buntu IV", j7.value||"Kosong", "J")}


Demikian Laporan ${shift} Stasiun Banjarsari, Terima Kasih.`;

window.open("https://wa.me/?text="+encodeURIComponent(txt));
}

window.onload = autoWaktu;

</script>
